<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Synapse · Focus protected</title>
		<link rel="stylesheet" href="blocked.css" />
	</head>
	<body>
		<main>
			<p class="eyebrow">Synapse focus guard</p>
			<h1>This page can wait.</h1>
			<p class="intention" id="intention">Return to your study session.</p>
			<div class="timer" id="timer">00:00</div>
			<p class="course" id="course">Focus session</p>
			<div class="actions">
				<button id="return">Return to studying</button>
				<button class="override" id="override">Allow a 5-minute break</button>
			</div>
			<p class="privacy">
				Synapse blocked this navigation without recording your browsing history.
			</p>
		</main>
		<script src="blocked.js"></script>
	</body>
</html>
